{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MARK FORM</title>
    <link rel="stylesheet" href="{% static 'css/mark_form.css' %}">
    <link rel="icon" type="images/png" href="{% static 'images/admin_icon.png'%}">
</head>
<body>
    <a href="{% url 'admin_view' %}">ADMIN VIEW</a>
      <div>
         <h1>MARK FORM</h1>
   
  
        <form action="" method="post">
            {% csrf_token%}
            <input type="text" name="student_name" placeholder="STUDENT NAME"><br><br>
            <input type="number" name="roll_no" placeholder="ROLL NO"><br><br>
            <input type="text" name="tamil_mark" placeholder="TAMIL MARK"><br><br>
            <input type="text" name="english_mark" placeholder="ENGLISH MARK"><br><br>
            <input type="text" name="maths_mark" placeholder="MATHS MARK"><br><br>
            <input type="text" name="science_mark" placeholder="SCIENCE MARK"><br><br>
            <input type="text" name="social_mark" placeholder="SOCIAL MARK"><br><br>
            <button type="submit">SUBMIT</button>
        </div>
    </form>
    
</body>
</html>
